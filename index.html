</head>
<body>

<header class="top-header">
        <h1>Payment Production Page</h1>
    </header>

    
<div class="controls">
    <a href="form/index-mpi-non-hosted.html" target="formDisplay">MPI - Non Hosted Page</a>
    <a href="form/pag-hosted.html" target="formDisplay">PAG - Hosted Page</a>

<!-- Ensure this exists if you want the forms to load on the same page -->
<!--<iframe name="formDisplay" width="100%" height="5000px"></iframe> -->

    <div class="container">
        <div class="left-panel">
            <iframe
                id="left-container"
                name="formDisplay"
                src="about:blank"
                title="Embedded Form Display"
                onload="resizeIframe(this)">
                Sorry, your browser does not support iframes.
            </iframe>
        </div>

    </div>

    <script>
    function resizeIframe(obj) {
        // We wrap in a try-catch to handle cross-origin security restrictions
        try {
            obj.style.height = obj.contentWindow.document.documentElement.scrollHeight + 'px';
        } catch (e) {
            console.warn("Could not resize iframe due to cross-origin policy.");
        }
    }
</script>
    
</body>
