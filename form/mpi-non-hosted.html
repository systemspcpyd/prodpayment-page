        /**
         * MP REQ - Main Payment Submission
         * Uses native form submission to Gateway to avoid CORS errors.
         */
async function mpReq() {
	// ---  Scrolls the main parent page to the top ---
    window.top.scrollTo({ top: 0, behavior: 'smooth' });
	
    const form = document.getElementById("form");
    const payButton = document.querySelector("button[onclick='mpReq()']");
    const responseType = document.getElementById("MPI_RESPONSE_TYPE").value;

    // 1. Prepare fields (Set Return URL and handle empty fields)
    // document.getElementById("MPI_RETURN_URL").value = VERCEL_CALLBACK_URL;
    
    const inputs = form.querySelectorAll('input, select, textarea');
    inputs.forEach(input => {
        if (!input.value.trim()) {
            input.disabled = true; // Essential for correct MAC generation on server
        }
    });

    // --- CASE A: Standard Form Redirect (No Response Type) ---
    if (!responseType) {
        payButton.disabled = true;
        payButton.innerText = "Redirecting to Gateway...";
        form.submit();
        
        // Re-enable for UI consistency if they hit 'back'
        setTimeout(() => {
            inputs.forEach(input => input.disabled = false);
            payButton.disabled = false;
            payButton.innerText = "Pay";
        }, 2000);
        return; 
    }

    // --- CASE B: Capture JSON and Forward (JSON/STRING Response Type) ---
    payButton.disabled = true;
    payButton.innerText = "Processing JSON...";

    // Re-enable temporarily to gather data for fetch
    inputs.forEach(input => input.disabled = false);
    const formData = new FormData(form);
    const payload = new URLSearchParams();
    
    formData.forEach((value, key) => {
        if (value.trim() !== "") payload.append(key, value);
    });

try {
    const response = await fetch(PAYMENT_REQUEST_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: payload
    });

    const data = await response.json();

    // --- REDIRECT LOGIC ---
    const callbackForm = document.getElementById("redirect-form");
    
    // FORCE the action to use your Vercel URL from config
    callbackForm.action = VERCEL_CALLBACK_URL; 
    callbackForm.method = "POST";
    callbackForm.innerHTML = ""; 

    Object.keys(data).forEach(key => {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = typeof data[key] === 'object' ? JSON.stringify(data[key]) : data[key];
        callbackForm.appendChild(input);
    });

    // Now this will POST to Vercel, not GitHub!
    callbackForm.submit();

} catch (error) {
    console.error('Error:', error);
    alert("Fetch failed. Check CORS or network.");
}
}


/**
* MK REQ - Key Exchange
* Handles the background communication for keys.
*/
async function mkReq() {
    let MID = document.forms["form"]["MPI_MERC_ID"].value;
    let transactionID = document.forms["form"]["MPI_TRXN_ID"].value;

    const raw = JSON.stringify({
        merchantId: MID,
        pubKey: PUBLICKEY,
        purchaseId: transactionID
    });

    try {
        const response = await fetch(KEY_EXCHANGE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: raw
        });

        console.log("HTTP status:", response.status);

        // IMPORTANT: read as text first
        const text = await response.text();
        console.log("Raw response:", text);

        let result;
        try {
            result = JSON.parse(text);
        } catch (e) {
            throw new Error("Response is not JSON");
        }

        if (result.errorCode === "000") {
            alert(`✅ Success!\nCode: ${result.errorCode}`);
        } else {
            alert(`❌ Failed\nCode: ${result.errorCode}\nMessage: ${result.errorDesc || result.errorMessage || "Unknown Error"}`);
        }

    } catch (error) {
        console.error('Error:', error);
        alert("⚠️ Check console + Vercel logs");
    }
}
        /**
         * MAC UTILITIES
         */
        function clear_mac() {
            // 1. Build the Raw String
            let rawString = 
                document.forms["form"]["MPI_TRANS_TYPE"].value +
                document.forms["form"]["MPI_MERC_ID"].value +
                document.forms["form"]["MPI_PAN"].value +

                document.forms["form"]["MPI_PURCH_CURR"].value +
                document.forms["form"]["MPI_PURCH_AMT"].value +
                document.forms["form"]["MPI_EMAIL"].value +
                document.forms["form"]["MPI_MOBILE_PHONE"].value +
                document.forms["form"]["MPI_MOBILE_PHONE_CC"].value +
                document.forms["form"]["MPI_ADDITIONAL_INFO_IND"].value+
                document.forms["form"]["MPI_RECURR_FREQ"].value+
                document.forms["form"]["MPI_RECURR_EXPIRY"].value;
        
            document.getElementById("mac").value = rawString;
        
            try {
                // CLEAN THE KEY HERE
                const CLEAN_KEY = PRIVATE_KEY.replace(/^[ \t]+/gm, '');
        
                let sig = new KJUR.crypto.Signature({"alg": "SHA256withRSA"});
                sig.init(CLEAN_KEY); 
                sig.updateString(rawString);
                let sigValueHex = sig.sign();
                
                let base64Value = hextob64(sigValueHex);
                let base64UrlValue = base64Value
                    .replace(/\+/g, '-')
                    .replace(/\//g, '_')
                    .replace(/=/g, '');
        
                document.forms["form"]["MPI_MAC"].value = base64UrlValue;
                
            } catch (e) {
                console.error("Signing Error:", e);
                alert("Error generating MAC. Make sure the private key is formatted correctly.");
            }
        }

   
        function trim_mac() {
            let macElement = document.forms["form"]["MPI_MAC"];
            let rawMac = macElement.value;
            let trimmedMac = rawMac.replace(/[+]/g, "-")
                                   .replace(/[/]/g, "_")
                                   .replace(/[=]/g, "");
            macElement.value = trimmedMac;
        }

        /**

            document.forms["form"]["MPI_TRXN_ID"].value = "MPIPRD" + x;
        }
