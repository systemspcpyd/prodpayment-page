<body>
    <div class="controls">
        <form id="form" method="post" action="">
            <label for="MPI_MERC_ID">MPI_MERC_ID (MID):</label>
            <input type="text" name="MPI_MERC_ID" id="MPI_MERC_ID" value='000000000000001' maxlength="15">

            <label for="MPI_TRXN_ID">MPI_TRXN_ID (Transaction ID):</label>
            <input type="text" name="MPI_TRXN_ID" id="MPI_TRXN_ID" maxlength="20">

            <label for="MPI_MAC">MPI_MAC (Signed MAC):</label>
            <textarea name="MPI_MAC" id="MPI_MAC" maxlength="344" rows="3"></textarea>
        </form>

        <button class="btn-refresh" onclick="refreshData()">
            Refresh Payment Channels
        </button>

        <div id="response-container">
            <h3>Available Payment Channels</h3>
            <table id="channel-table">
                <thead>
                    <tr>
                        <th>CHANNEL NAME</th>
                        <th>CHANNEL ID</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

        async function refreshData() {
            let d = new Date();
            let y = "GETCNL" + d.getFullYear() + (d.getMonth() + 1).toString().padStart(2, '0') + d.getDate().toString().padStart(2, '0') + d.getHours().toString().padStart(2, '0') + d.getMinutes().toString().padStart(2, '0') + d.getSeconds().toString().padStart(2, '0');
            document.forms["form"]["MPI_TRXN_ID"].value = y;

            const success = await mkReq();
            if (success) channel();
        }

        window.addEventListener("load", refreshData);

        async function mkReq() {
            const raw = JSON.stringify({ 
                "merchantId": document.forms["form"]["MPI_MERC_ID"].value, 
                "pubKey": PUBLICKEY, 
                "purchaseId": document.forms["form"]["MPI_TRXN_ID"].value 
            });

            try {
                const response = await fetch(KEY_EXCHANGE_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json" },
                    body: raw
                });
                const result = await response.json();
                
                if (result.errorCode === "000") {
                    clear_mac();
                    return true;
                } else {
                    alert(`❌ Key Exchange Failed\n\nError Code: ${result.errorCode}\nMessage: ${result.errorDesc || result.errorMessage || "Unknown Error"}`);
                    return false;
                }
            } catch (error) {
                alert("Connection Error during Key Exchange.");
                return false;
            }
        }

         function channel() {
                    const params = new URLSearchParams({
                        "MPI_MERC_ID": document.forms["form"]["MPI_MERC_ID"].value,
                        "MPI_TRXN_ID": document.forms["form"]["MPI_TRXN_ID"].value,
                        "MPI_MAC": document.forms["form"]["MPI_MAC"].value
                    });
        
                    fetch(`${GET_CHANNEL_URL}?${params.toString()}`)
                        .then(res => res.json())
                        .then(data => {
                            const tbody = document.getElementById('table-body');
                            const container = document.getElementById('response-container');
                            tbody.innerHTML = "";
                            
                            if (data.MPI_PAYMENT_CHANNEL_LIST) {
                                container.style.display = 'block';
        
                                // Define custom sort order
                                const order = { "DNQR": 1, "EWALLETS": 2, "FPX": 3 };
        
                                // Sort the list based on the predefined order
                                const sortedList = data.MPI_PAYMENT_CHANNEL_LIST.sort((a, b) => {
                                    return (order[a.MPI_PAYMENT_METHOD] || 99) - (order[b.MPI_PAYMENT_METHOD] || 99);
                                });
        
                                sortedList.forEach(category => {
									// Add a header row for the Payment Method
									let headerRow = tbody.insertRow();
									headerRow.className = "row-header"; // Apply the class here instead of inline style
									let cell = headerRow.insertCell(0);
									cell.colSpan = 3;
									cell.innerHTML = `<strong>${category.MPI_PAYMENT_METHOD}</strong>`;
        
                                category.MPI_PAYMENT_CHANNEL.forEach(item => {
                                    let row = tbody.insertRow();
                                    row.insertCell(0).textContent = item.MPI_CHANNEL_NAME;
                                    row.insertCell(1).textContent = item.MPI_CHANNEL_ID;
                                
                                    // Concise ternary version
									row.insertCell(2).innerHTML = item.MPI_CHANNEL_STATUS === 'A' 
										? '<span class="status-active">Active</span>' 
										: '<span class="status-offline">Offline</span>';
                                });
                                });
                            } else {
                                alert("No channels found: " + (data.MPI_ERROR_DESC || "Unknown Error"));
                            }
                        });
                }

        function clear_mac() {
            let rawString = document.forms["form"]["MPI_MERC_ID"].value + document.forms["form"]["MPI_TRXN_ID"].value;
            let sig = new KJUR.crypto.Signature({"alg": "SHA256withRSA"});
            sig.init(PRIVATE_KEY.replace(/^[ \t]+/gm, ''));
            sig.updateString(rawString);
            document.forms["form"]["MPI_MAC"].value = hextob64(sig.sign()).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }

        headerRow.className = "row-header";
        // ...
        row.insertCell(2).innerHTML = item.MPI_CHANNEL_STATUS === 'A' 
            ? '<span class="status-active">Active</span>' 
            : '<span class="status-offline">Offline</span>';
    </script>

</html>
